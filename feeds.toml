# Second Brain — pull-feeder subscriptions (external tool #4; see docs/external-tools.md §4).
#
# This file IS part of the brain's identity: your subscription list, committed to git.
# The pull feeder (bin/brain-feed.sh) reads it once daily, pulls new items from each
# feed, and routes them by trust. It does ZERO synthesis — the nightly /sync folds in
# whatever it deposits.
#
# THE DELIBERATE ACT is choosing and trusting a feed here (not clipping each item):
#   trust = "auto"   -> items flow straight into sources/  (a curated, trusted feed)
#   trust = "queue"  -> items land in .brain/review/ for `brain-feed review` (noisy feeds)
#
# A per-feed daily cap bounds throughput so no single feed can flood the brain; overflow
# is deferred (left unseen) and drains over following days. Set globally or per feed.
default_cap = 3

# Every feed needs: id (unique), adapter (rss|list|yt|email), trust (auto|queue).
# Optional: n (this feed's daily cap), tags (added to each deposited source's frontmatter),
# title (a label). All examples below are COMMENTED OUT — uncomment + edit to activate.
# Until you add a real feed, `brain-feed run` is a safe no-op.

# === Active subscriptions (activated 2026-06-24) ===========================
# Five feeds matching this brain's focus: LLMs, agentic coding, NLP papers.
# Every URL below was HTTP-200 validated at activation time.
#   auto  -> straight into sources/  (the nightly 02:00 /sync folds them in)
#   queue -> land in .brain/review/ for `brain-feed review` triage.

[[feed]]
id = "simon-willison"
adapter = "rss"
url = "https://simonwillison.net/atom/everything/"
trust = "auto"
n = 3
tags = ["blog", "llm"]
title = "Simon Willison"

[[feed]]
id = "andrej-karpathy"
adapter = "rss"
url = "https://karpathy.bearblog.dev/feed/?type=rss"
trust = "auto"
n = 2
tags = ["blog", "llm"]
title = "Andrej Karpathy"

# Noisy aggregator query -> queued for triage, not trusted.
[[feed]]
id = "hn-ai"
adapter = "rss"
url = "https://hnrss.org/newest?q=AI&points=100"
trust = "queue"
n = 10
tags = ["news", "ai"]
title = "Hacker News — AI (>=100 pts)"

# arXiv NLP/CL — high volume, mixed relevance -> queue.
[[feed]]
id = "arxiv-cs-cl"
adapter = "rss"
url = "https://export.arxiv.org/rss/cs.CL"
trust = "queue"
n = 5
tags = ["paper", "nlp"]
title = "arXiv cs.CL"

# Lobsters: the `ai` tag only (its `ml` tag means MetaLanguage/OCaml, not machine learning).
[[feed]]
id = "lobsters-ai"
adapter = "rss"
url = "https://lobste.rs/t/ai.rss"
trust = "queue"
n = 8
tags = ["news", "ai"]
title = "Lobsters — AI tag"

