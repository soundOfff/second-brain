<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    :root {
      --bg:#1c1a16; --panel:#211e19; --line:#322e28; --line2:#38332c;
      --ink:#f5f1e8; --ink2:#ece8df; --mut:#9a9384; --mut2:#7e786b; --mut3:#6d6759;
      --accent:#d8a04a; --accent-on:#1a1916; --accent-13:rgba(216,160,74,.13);
      --accent-22:rgba(216,160,74,.22); --accent-30:rgba(216,160,74,.30);
      --mono: ui-monospace,'SF Mono',SFMono-Regular,Menlo,monospace;
      --sans: Inter,-apple-system,system-ui,'Segoe UI',sans-serif;
    }
    * { box-sizing: border-box; }
    ::selection { background: var(--accent-30); }
    html,body { margin:0; }
    body {
      width:392px; background:var(--bg); color:var(--ink2);
      font-family:var(--sans); font-size:13px; -webkit-font-smoothing:antialiased;
    }
    .hidden { display:none !important; }

    /* header */
    .hdr { padding:15px 18px 0; display:flex; align-items:center; justify-content:space-between; }
    .brand { display:flex; align-items:center; gap:9px; }
    .brand-dot {
      width:18px; height:18px; border-radius:5px; display:flex; align-items:center;
      justify-content:center; font-size:9px; color:var(--accent-on); background:var(--accent);
    }
    .wordmark {
      font-family:var(--mono); font-size:11px; font-weight:700;
      letter-spacing:1.6px; color:#b8b1a4;
    }
    .dest-tag {
      font-family:var(--mono); font-size:10px; font-weight:600; color:var(--accent);
      background:rgba(216,160,74,.10); border:1px solid var(--accent-22);
      border-radius:5px; padding:3px 7px;
    }

    .body { padding:14px 18px 18px; display:flex; flex-direction:column; gap:14px; }

    /* current-tab card */
    .card {
      background:var(--panel); border:1px solid var(--line); border-radius:10px;
      padding:12px 13px; display:flex; gap:11px;
    }
    .favicon {
      flex:0 0 auto; width:34px; height:34px; border-radius:8px; display:flex;
      align-items:center; justify-content:center; font-weight:700; font-size:15px;
      background:#3a362f; color:#b8b1a4; overflow:hidden;
    }
    .favicon img { width:20px; height:20px; display:block; }
    .card-meta { min-width:0; flex:1; }
    .card-title {
      font-size:13.5px; font-weight:600; line-height:1.3; color:var(--ink);
      display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden;
    }
    .card-url {
      font-family:var(--mono); font-size:10.5px; color:var(--mut2); margin-top:5px;
      white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
    }

    /* detection row */
    .detect { display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
    .kind-badge {
      font-family:var(--mono); font-size:10px; font-weight:700; letter-spacing:.6px;
      text-transform:uppercase; color:#b8b1a4; background:#252219;
      border:1px solid var(--line); border-radius:5px; padding:3px 8px;
    }
    .detect .size { font-family:var(--mono); font-size:10.5px; color:var(--mut2); }
    .detect .dot { color:#3a362f; }

    /* suggested tags */
    .tags-wrap { display:flex; flex-direction:column; gap:7px; }
    .tags-label {
      font-family:var(--mono); font-size:9.5px; font-weight:600; letter-spacing:1px;
      text-transform:uppercase; color:var(--mut3);
    }
    .tags { display:flex; gap:7px; flex-wrap:wrap; }
    .chip {
      font-family:var(--mono); font-size:11px; font-weight:600; border-radius:6px;
      padding:4px 9px; cursor:pointer; user-select:none; transition:all .12s;
      color:var(--mut2); background:var(--panel); border:1px solid var(--line);
    }
    .chip:hover { border-color:#4a443a; color:var(--mut); }
    .chip.on {
      color:var(--accent); background:var(--accent-13); border-color:var(--accent-30);
    }
    .chip.on:hover { color:var(--accent); }

    /* note */
    textarea.note {
      width:100%; height:62px; resize:none; background:var(--panel);
      border:1px solid var(--line); border-radius:10px; padding:11px 12px;
      font-family:var(--sans); font-size:13px; line-height:1.5; color:var(--ink2); outline:none;
    }
    textarea.note:focus { border-color:var(--accent); }
    textarea.note::placeholder { color:var(--mut3); }
    textarea.note::-webkit-scrollbar { width:8px; }
    textarea.note::-webkit-scrollbar-thumb { background:#3a362f; border-radius:6px; }

    /* warning */
    .warn {
      display:flex; gap:9px; align-items:flex-start; background:rgba(216,120,74,.10);
      border:1px solid rgba(216,120,74,.28); border-radius:9px; padding:10px 12px;
    }
    .warn .ico { color:#e0a276; font-size:13px; line-height:1.2; }
    .warn .txt { font-size:11.5px; line-height:1.45; color:#d8b59a; }

    /* actions */
    .actions { display:flex; gap:9px; }
    .btn {
      flex:1; display:flex; align-items:center; justify-content:center; gap:8px;
      height:38px; font-size:13px; font-weight:650; border-radius:10px; cursor:pointer;
      user-select:none; transition:all .12s; border:1px solid transparent;
      font-family:var(--sans);
    }
    .btn-primary { background:var(--accent); color:var(--accent-on); border-color:var(--accent); }
    .btn-primary:hover { filter:brightness(1.08); }
    .btn-primary:disabled, .btn-primary.disabled {
      background:#211e1a; color:#5a554c; border-color:var(--line);
      cursor:default; opacity:.5; filter:none;
    }
    .btn-ghost { background:transparent; color:#b8b1a4; border-color:#3a362f; }
    .btn-ghost:hover { border-color:#4a443a; color:var(--ink2); }
    .kbd {
      font-family:var(--mono); font-size:10px; font-weight:700; background:rgba(0,0,0,.28);
      border-radius:4px; padding:1px 5px; color:var(--accent-on);
    }
    .btn-primary.disabled .kbd { display:none; }

    /* footer */
    .footer {
      display:flex; align-items:center; gap:8px; border-top:1px solid #2a2722;
      padding-top:12px; font-family:var(--mono); font-size:10px; color:var(--mut3);
    }
    .footer .lands { color:var(--accent); }
    .footer .spacer { flex:1; }

    /* status (errors) */
    .status { font-family:var(--mono); font-size:11px; min-height:0; line-height:1.4; }
    .status.err { color:#e0926e; }

    /* success state */
    .done { display:flex; flex-direction:column; align-items:center; text-align:center; gap:13px; padding:10px 4px 6px; }
    .check {
      width:48px; height:48px; border-radius:50%; display:flex; align-items:center;
      justify-content:center; font-size:24px; font-weight:700; color:var(--accent-on);
      background:var(--accent); box-shadow:0 0 0 6px rgba(216,160,74,.14);
    }
    .done-title { font-size:15px; font-weight:650; color:var(--ink); }
    .done-sub { font-size:12.5px; color:var(--mut); margin-top:4px; line-height:1.5; }
    .path {
      width:100%; background:var(--panel); border:1px solid var(--line); border-radius:9px;
      padding:10px 12px; display:flex; align-items:center; gap:9px;
    }
    .path .plus { color:var(--accent); font-family:var(--mono); font-size:12px; }
    .path .p {
      font-family:var(--mono); font-size:11px; color:#b8b1a4; white-space:nowrap;
      overflow:hidden; text-overflow:ellipsis; flex:1; text-align:left;
    }
  </style>
</head>
<body>
  <div class="hdr">
    <div class="brand">
      <div class="brand-dot">◆</div>
      <span class="wordmark">CLIP TO BRAIN</span>
    </div>
    <span class="dest-tag">→ sources/</span>
  </div>

  <!-- IDLE / EDIT STATE -->
  <div class="body" id="form">
    <div class="card">
      <div class="favicon" id="favicon">◆</div>
      <div class="card-meta">
        <div class="card-title" id="title">…</div>
        <div class="card-url" id="url"></div>
      </div>
    </div>

    <div class="detect">
      <span class="kind-badge" id="kind">…</span>
      <span class="size hidden" id="sizeDot"> · </span>
      <span class="size hidden" id="size"></span>
    </div>

    <div class="tags-wrap hidden" id="tagsWrap">
      <span class="tags-label">Suggested tags</span>
      <div class="tags" id="tags"></div>
    </div>

    <textarea class="note" id="note" placeholder="Optional note to attach…"></textarea>

    <div class="warn hidden" id="warn">
      <span class="ico">⚠</span>
      <span class="txt">This tab isn’t a web page — capture it as a standalone note instead.</span>
    </div>

    <div class="actions">
      <button class="btn btn-primary" id="clipPage">
        <span id="clipPageLabel">Clip to sources</span>
        <span class="kbd">⌘S</span>
      </button>
      <button class="btn btn-ghost" id="clipNote">Note only</button>
    </div>

    <div class="status" id="status"></div>

    <div class="footer">
      <span>lands in</span>
      <span class="lands">sources/inbox/</span>
      <span class="spacer"></span>
      <span>→ nightly /sync</span>
    </div>
  </div>

  <!-- SUCCESS STATE -->
  <div class="body hidden" id="done">
    <div class="done">
      <div class="check">✓</div>
      <div>
        <div class="done-title" id="doneTitle">Clipped to sources</div>
        <div class="done-sub" id="doneSub">Queued for review. The wiki folds it in on the nightly /sync.</div>
      </div>
      <div class="path">
        <span class="plus">＋</span>
        <span class="p" id="savedPath">sources/…</span>
      </div>
      <div class="actions" style="width:100%; margin-top:2px;">
        <button class="btn btn-ghost" id="clipAnother">Clip another</button>
      </div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
