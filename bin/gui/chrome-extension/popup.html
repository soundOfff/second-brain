<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body { font: 13px/1.4 -apple-system, system-ui, sans-serif; width: 300px; margin: 0; padding: 12px; color: #1d1d1f; }
    h1 { font-size: 13px; margin: 0 0 8px; color: #6e6e73; font-weight: 600; letter-spacing: .02em; text-transform: uppercase; }
    .page { font-weight: 600; word-break: break-word; }
    .url { color: #6e6e73; font-size: 11px; word-break: break-all; margin: 2px 0 10px; }
    textarea { width: 100%; box-sizing: border-box; min-height: 48px; font: inherit; padding: 6px; border: 1px solid #d2d2d7; border-radius: 6px; resize: vertical; }
    .row { display: flex; gap: 8px; margin-top: 10px; }
    button { flex: 1; font: inherit; font-weight: 600; padding: 8px; border: 0; border-radius: 6px; cursor: pointer; }
    .primary { background: #0071e3; color: #fff; }
    .secondary { background: #e8e8ed; color: #1d1d1f; }
    button:disabled { opacity: .5; cursor: default; }
    #status { margin-top: 10px; font-size: 12px; min-height: 16px; }
    .ok { color: #1d8a3f; } .err { color: #c4271c; }
  </style>
</head>
<body>
  <h1>Clip to Brain</h1>
  <div class="page" id="title">…</div>
  <div class="url" id="url"></div>
  <textarea id="note" placeholder="Optional note to attach…"></textarea>
  <div class="row">
    <button class="primary" id="clipPage">Clip page</button>
    <button class="secondary" id="clipNote">Clip note only</button>
  </div>
  <div id="status"></div>
  <script src="popup.js"></script>
</body>
</html>
